version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lol-postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lol}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lol_secret}
      POSTGRES_DB: ${POSTGRES_DB:-lol_vnext}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-lol}']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
